<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>開心農場</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- ── Header ── -->
    <header>
      <h1>🌾 開心農場</h1>
      <div id="stats">
        <span>🪙 <strong id="coins">100</strong></span>
        <span>⭐ Lv.<strong id="level">1</strong></span>
        <span>EXP <span id="exp">0</span>/<span id="exp-next">800</span></span>
        <span id="weather-display">🌞 晴天</span>
      </div>
      <div id="header-btns">
        <button id="player-btn" title="切換玩家">👤 ...</button>
        <button id="bg-toggle" title="背景音樂">🎵</button>
        <button id="sfx-toggle" title="音效">🔊</button>
        <button id="restart-btn" title="重新開始">🔄</button>
        <button id="fullscreen-btn" title="全螢幕">⛶</button>
      </div>
    </header>

    <!-- ── Main: 左側工具 | 農場 | 右側種子+日誌 ── -->
    <main>

      <!-- 左側：工具 + 倉庫 -->
      <aside id="left-panel">
        <section id="tool-panel">
          <h2>工具</h2>
          <div id="tools">
            <button class="tool-btn active" data-tool="plant">🌱 種植</button>
            <button class="tool-btn" data-tool="water">💧 澆水</button>
            <button class="tool-btn" data-tool="harvest">🌾 收穫</button>
            <button class="tool-btn" data-tool="fertilize">⚗️ 施肥</button>
            <button class="tool-btn" data-tool="remove">🗑️ 清除</button>
          </div>
        </section>
        <section id="inventory-panel">
          <h2>倉庫</h2>
          <div id="inventory"></div>
          <button id="sell-all-btn">賣出全部 (獲得金幣)</button>
        </section>
      </aside>

      <!-- 中間：農場格 -->
      <section id="farm-section">
        <div id="farm-grid"></div>
      </section>

      <!-- 右側：種子商店 + 日誌 -->
      <aside id="right-panel">
        <section id="seed-shop">
          <h2>種子商店</h2>
          <div id="seed-list"></div>
        </section>
        <section id="log-panel">
          <h2>農場日誌</h2>
          <ul id="log-list"></ul>
        </section>
      </aside>

    </main>

  </div>

  <!-- ── Modal ── -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <h3 id="modal-title"></h3>
      <div id="modal-body"></div>
      <input id="modal-input" type="text" class="hidden" maxlength="12" autocomplete="off">
      <div id="modal-actions">
        <button id="modal-confirm" class="hidden">確認</button>
        <button id="modal-close">關閉</button>
      </div>
    </div>
  </div>

  <script src="audio.js"></script>
  <script src="game.js"></script>
</body>
</html>
