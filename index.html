<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>開心農場</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- ── Header ── -->
    <header>
      <h1>🌾 開心農場</h1>
      <div id="stats">
        <span>🪙 <strong id="coins">100</strong></span>
        <span>⭐ Lv.<strong id="level">1</strong></span>
        <span>EXP <span id="exp">0</span>/<span id="exp-next">800</span></span>
        <span id="weather-display">🌞 晴天</span>
      </div>
      <div id="header-btns">
        <button id="bg-toggle" title="背景音樂">🎵</button>
        <button id="sfx-toggle" title="音效">🔊</button>
        <button id="restart-btn" title="重新開始">🔄</button>
        <button id="fullscreen-btn" title="全螢幕">⛶</button>
      </div>
    </header>

    <!-- ── Toolbar ── -->
    <div id="toolbar">
      <div id="tools">
        <button class="tool-btn active" data-tool="plant">🌱 種植</button>
        <button class="tool-btn" data-tool="water">💧 澆水</button>
        <button class="tool-btn" data-tool="harvest">🌾 收穫</button>
        <button class="tool-btn" data-tool="fertilize">⚗️ 施肥</button>
        <button class="tool-btn" data-tool="remove">🗑️ 清除</button>
      </div>
      <div id="seed-scroller">
        <div id="seed-list"></div>
      </div>
      <button id="sell-all-btn">💰 全賣出</button>
    </div>

    <!-- ── Main ── -->
    <main>
      <section id="farm-section">
        <div id="farm-grid"></div>
      </section>

      <aside id="sidebar">
        <section id="inventory-panel">
          <h2>倉庫</h2>
          <div id="inventory"></div>
        </section>
        <section id="log-panel">
          <h2>農場日誌</h2>
          <ul id="log-list"></ul>
        </section>
      </aside>
    </main>

  </div>

  <!-- ── Modal ── -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <h3 id="modal-title"></h3>
      <div id="modal-body"></div>
      <button id="modal-close">關閉</button>
    </div>
  </div>

  <script src="audio.js"></script>
  <script src="game.js"></script>
</body>
</html>
